version: '3.9'

services:
  # FastAPI backend
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./apps/api/.env
    volumes:
      - ./apps/api:/app
    depends_on:
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Celery worker
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      - ENV=development
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./apps/api/.env
    volumes:
      - ./apps/api:/app
    depends_on:
      - redis
    command: celery -A workers.build_brain.celery_app worker --loglevel=info --concurrency=2

  # Redis (job queue + cache)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Flower (Celery monitoring) — dev only
  flower:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    command: celery -A workers.build_brain.celery_app flower --port=5555

volumes:
  redis_data:
